<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CubePath Chat</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f1115;
        --panel: #171a21;
        --text: #e9edf1;
        --muted: #98a2b3;
        --line: #2a3140;
        --accent: #9cc9ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .card {
        width: min(860px, 92vw);
        border: 1px solid var(--line);
        background: var(--panel);
        border-radius: 14px;
        padding: 20px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 1.1rem;
        font-weight: 600;
      }

      p {
        margin: 0 0 16px;
        color: var(--muted);
        font-size: 0.95rem;
      }

      textarea {
        width: 100%;
        min-height: 110px;
        resize: vertical;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: #11141b;
        color: var(--text);
        padding: 12px;
        font: inherit;
      }

      .row {
        display: flex;
        gap: 10px;
        margin-top: 10px;
      }

      input,
      button {
        border-radius: 10px;
        border: 1px solid var(--line);
        background: #11141b;
        color: var(--text);
        padding: 10px 12px;
        font: inherit;
      }

      input {
        flex: 1;
      }

      button {
        cursor: pointer;
        border-color: #4d6f95;
        background: #1a2738;
      }

      button:disabled {
        opacity: 0.65;
        cursor: not-allowed;
      }

      .output {
        margin-top: 14px;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 12px;
        min-height: 130px;
        white-space: pre-wrap;
        word-break: break-word;
        background: #11141b;
      }

      .meta {
        margin-top: 10px;
        color: var(--accent);
        font-size: 0.88rem;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>CubePath OpenRouter Chat</h1>
      <p>Prueba `POST /chat` en streaming desde esta página.</p>

      <textarea id="prompt" placeholder="Escribe tu mensaje...">Dime un resumen corto sobre Bun.</textarea>

      <div class="row">
        <input id="model" value="openrouter/free" />
        <button id="send">Enviar</button>
      </div>

      <div id="output" class="output"></div>
      <div id="meta" class="meta"></div>
    </main>

    <script>
      const promptEl = document.getElementById("prompt");
      const modelEl = document.getElementById("model");
      const sendBtn = document.getElementById("send");
      const outputEl = document.getElementById("output");
      const metaEl = document.getElementById("meta");

      const decoder = new TextDecoder();

      function appendText(text) {
        outputEl.textContent += text;
      }

      function clearOutput() {
        outputEl.textContent = "";
        metaEl.textContent = "";
      }

      async function parseSseStream(stream) {
        const reader = stream.getReader();
        let buffer = "";

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const events = buffer.split("\n\n");
          buffer = events.pop() || "";

          for (const eventBlock of events) {
            const lines = eventBlock.split("\n");
            let eventName = "message";
            const dataLines = [];

            for (const line of lines) {
              if (line.startsWith("event:")) {
                eventName = line.slice(6).trim();
              } else if (line.startsWith("data:")) {
                dataLines.push(line.slice(5).trim());
              }
            }

            const rawData = dataLines.join("\n");
            if (!rawData) continue;

            let payload;
            try {
              payload = JSON.parse(rawData);
            } catch {
              continue;
            }

            if (eventName === "token" && payload.content) {
              appendText(payload.content);
            } else if (eventName === "usage") {
              metaEl.textContent = `Usage: ${JSON.stringify(payload)}`;
            } else if (eventName === "error") {
              metaEl.textContent = `Error: ${payload.message || "stream error"}`;
            }
          }
        }
      }

      sendBtn.addEventListener("click", async () => {
        const prompt = promptEl.value.trim();
        const model = modelEl.value.trim() || "openrouter/free";
        if (!prompt) return;

        clearOutput();
        sendBtn.disabled = true;
        sendBtn.textContent = "Enviando...";

        try {
          const response = await fetch("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              model,
              messages: [{ role: "user", content: prompt }],
            }),
          });

          if (!response.ok || !response.body) {
            const text = await response.text();
            throw new Error(text || `HTTP ${response.status}`);
          }

          await parseSseStream(response.body);
        } catch (error) {
          metaEl.textContent = `Error: ${error instanceof Error ? error.message : String(error)}`;
        } finally {
          sendBtn.disabled = false;
          sendBtn.textContent = "Enviar";
        }
      });
    </script>
  </body>
</html>
